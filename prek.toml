# General structural file validation (Verified v6.0.0)
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-added-large-files" }
]

# Strict secret scanning to protect tokens/keys (Verified v8.30.1)
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
    { id = "gitleaks" }
]

# Shell script linting for .zshrc, aliases, etc. (Verified v0.11.0)
[[repos]]
repo = "https://github.com/koalaman/shellcheck-precommit"
rev = "v0.11.0"
hooks = [
    { id = "shellcheck" }
]

# Local system validation hook for chezmoi state health
[[repos]]
repo = "local"
hooks = [
    { id = "chezmoi-doctor", name = "chezmoi doctor", entry = "chezmoi doctor", language = "system", pass_filenames = false, always_run = true }
]
